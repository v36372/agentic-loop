pre-commit:
  parallel: true
  jobs:
    - name: oxfmt
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,md,yml,yaml}"
      exclude: "{.agent_sources,.pi}/**"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    - name: oxlint
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      exclude: "{.agent_sources,.pi}/**"
      run: pnpm exec oxlint {staged_files} --ignore-pattern '.agent_sources/**' --ignore-pattern '.pi/**'
